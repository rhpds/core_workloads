---
# Eject virtual media from a BMC node after install
# Called in a loop with _bmc_ip as the loop var

- name: Get Redfish system ID for {{ _bmc_ip }}
  ansible.builtin.uri:
    url: "http://{{ _bmc_ip }}:8000/redfish/v1/Systems"
    user: "{{ host_ocp4_bmc_user }}"
    password: "{{ host_ocp4_bmc_password }}"
    force_basic_auth: true
    return_content: true
  register: _redfish_systems_eject
  ignore_errors: true

- name: Eject virtual media on {{ _bmc_ip }}
  when: _redfish_systems_eject is success
  ansible.builtin.uri:
    url: "http://{{ _bmc_ip }}:8000/redfish/v1/Systems/{{ _redfish_systems_eject.json.Members[0]['@odata.id'].split('/')[-1] }}/VirtualMedia/Cd/Actions/VirtualMedia.EjectMedia"
    method: POST
    user: "{{ host_ocp4_bmc_user }}"
    password: "{{ host_ocp4_bmc_password }}"
    force_basic_auth: true
    body_format: json
    body: {}
    status_code: [200, 204]
  ignore_errors: true
