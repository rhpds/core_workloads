---
- name: Install RHACS Operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: rhacs-operator
    install_operator_namespace: "{{ ocp4_workload_rhacs_install_operator_namespace }}"
    install_operator_channel: "{{ ocp4_workload_rhacs_install_operator_channel | default('') }}"
    install_operator_automatic_install_plan_approval: "{{ ocp4_workload_rhacs_automatic_install_plan_approval | default(true) }}"
    install_operator_starting_csv: "{{ ocp4_workload_rhacs_install_operator_starting_csv }}"
    install_operator_use_catalog_snapshot: "{{ ocp4_workload_rhacs_install_operator_use_catalog_snapshot }}"
    install_operator_catalogsource_image: "{{ ocp4_workload_rhacs_install_operator_catalog_source_image | default('') }}"
    install_operator_catalogsource_image_tag: "{{ ocp4_workload_rhacs_install_operator_catalog_source_tag | default('') }}"

- name: Create Central Namespace
  kubernetes.core.k8s:
    state: present
    api_version: v1
    kind: Namespace
    name: "{{ ocp4_workload_rhacs_central_namespace }}"
  register: r_central_namespace
  until: r_central_namespace is successful
  retries: 5
  delay: 5

- name: Create collector config
  when: ocp4_workload_rhacs_collector_config_enable | bool
  kubernetes.core.k8s:
    state: present
    template: collector-config.yaml.j2
  register: r_collector_config
  until: r_collector_config is successful
  retries: 5
  delay: 5

- name: Generate admin password
  when: ocp4_workload_rhacs_central_admin_password | default('') | length == 0
  ansible.builtin.set_fact:
    _ocp4_workload_rhacs_central_admin_password: >-
      {{ lookup('password', '/dev/null chars=ascii_letters,digits '
          ~ 'length=' ~ ocp4_workload_rhacs_central_admin_password_length
      ) }}

- name: Use provided admin password
  when: ocp4_workload_rhacs_central_admin_password | default('') | length > 0
  ansible.builtin.set_fact:
    _ocp4_workload_rhacs_central_admin_password: >-
      {{ ocp4_workload_rhacs_central_admin_password }}

- name: Create Secret for Central admin password
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: acs-password
        namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
      data:
        password: "{{ _ocp4_workload_rhacs_central_admin_password | b64encode }}"
      type: Opaque
  register: r_secret
  until: r_secret is successful
  retries: 30
  delay: 5

- name: Set up Certificate for Central
  when: ocp4_workload_rhacs_enable_route_certs | bool
  ansible.builtin.include_tasks: certificate.yml

- name: Get rhacs-central-tls secret for reencrypt route
  when: ocp4_workload_rhacs_enable_reencrypt_route | bool
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: rhacs-central-tls
    namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
  register: r_rhacs_central_tls_secret

- name: Extract CA certificate chain for reencrypt route
  when:
    - ocp4_workload_rhacs_enable_reencrypt_route | bool
    - r_rhacs_central_tls_secret.resources | default([]) | length > 0
  block:
    - name: Extract intermediate CA chain from certificate
      ansible.builtin.set_fact:
        _cert_intermediate_ca_chain: >-
          {{ r_rhacs_central_tls_secret.resources[0].data['tls.crt'] | b64decode |
             regex_replace('^[\\s\\S]*?-----END CERTIFICATE-----\\n', '') }}

    - name: Get cluster trusted CA bundle
      kubernetes.core.k8s_info:
        api_version: v1
        kind: ConfigMap
        name: trusted-ca-bundle
        namespace: openshift-config-managed
      register: r_cluster_trusted_ca_bundle

    - name: Combine intermediate CAs with cluster trust bundle
      ansible.builtin.set_fact:
        _ocp4_workload_rhacs_reencrypt_destination_ca: >-
          {{ _cert_intermediate_ca_chain }}{{ r_cluster_trusted_ca_bundle.resources[0].data['ca-bundle.crt'] }}

- name: Create Central
  vars:
    _ocp4_workload_rhacs_central_certificate: "{{ r_certificate_central is defined and r_certificate_central is succeeded }}"
  kubernetes.core.k8s:
    state: present
    template: central.yaml.j2
  register: r_central
  until: r_central is successful
  retries: 5
  delay: 5

- name: Wait for Central availability
  kubernetes.core.k8s_info:
    api_version: platform.stackrox.io/v1alpha1
    kind: Central
    name: stackrox-central-services
    namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
  register: r_central
  until: >-
    (r_central.resources[0].status | default({})).conditions | default([]) |
    selectattr('type', 'equalto', 'Available') |
    selectattr('status', 'equalto', 'True') |
    selectattr('reason', 'equalto', 'DeploymentsReady') |
    list | length > 0
    or
    (r_central.resources[0].status | default({})).conditions | default([]) |
    selectattr('type', 'equalto', 'Deployed') |
    selectattr('status', 'equalto', 'True') |
    selectattr('reason', 'equalto', 'InstallSuccessful') |
    list | length > 0
  retries: 120
  delay: 5

- name: Get Central Route
  kubernetes.core.k8s_info:
    kind: Route
    api_version: route.openshift.io/v1
    namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
    name: central
  register: r_stackrox_central_route
  retries: 5
  delay: 5
  until: r_stackrox_central_route.resources[0].spec.host is defined

- name: Store Central Route facts
  ansible.builtin.set_fact:
    _ocp4_workload_rhacs_central_host: "{{ r_stackrox_central_route.resources[0].spec.host }}"
    _ocp4_workload_rhacs_central_route: "https://{{ r_stackrox_central_route.resources[0].spec.host }}"

- name: Get Central reencrypt route
  when: ocp4_workload_rhacs_enable_reencrypt_route | bool
  block:
    - name: Get reencrypt route info
      kubernetes.core.k8s_info:
        kind: Route
        api_version: route.openshift.io/v1
        namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
        name: central-reencrypt
      register: r_stackrox_central_reencrypt_route
      retries: 5
      delay: 5
      until: r_stackrox_central_reencrypt_route.resources[0].spec.host is defined

    - name: Store Central reencrypt Route facts
      ansible.builtin.set_fact:
        _ocp4_workload_rhacs_central_reencrypt_host: "{{ r_stackrox_central_reencrypt_route.resources[0].spec.host }}"
        _ocp4_workload_rhacs_central_reencrypt_route: "https://{{ r_stackrox_central_reencrypt_route.resources[0].spec.host }}"

- name: Register DNS for Central route
  when: ocp4_workload_rhacs_enable_dns_registration | bool
  ansible.builtin.include_tasks: dns_registration.yml

- name: Wait for StackRox Central to return 200 status
  ansible.builtin.uri:
    url: "{{ _ocp4_workload_rhacs_central_route }}"
    method: GET
    validate_certs: false
    status_code: 200
  register: r_stackrox_central_check
  until: r_stackrox_central_check.status == 200
  # 30 minutes: a transient NXDOMAIN for the route hostname can be
  # negative-cached along the resolver chain well past the old 5-minute
  # budget (dyn.redhatworkshops.io SOA minimum is 24h)
  retries: 90
  delay: 20

# ACS Secured Cluster (Sensor) Installation
- name: Get cluster init bundle
  ansible.builtin.uri:
    url: "{{ _ocp4_workload_rhacs_central_route }}/v1/cluster-init/init-bundles"
    # random name for init-bundle
    body: "{ \"name\": \"prod-{{ lookup('password', '/dev/null chars=ascii_lowercase,digits length=8') }}\"}"
    method: POST
    user: admin
    password: "{{ _ocp4_workload_rhacs_central_admin_password }}"
    body_format: json
    force_basic_auth: true
    validate_certs: false
  register: r_stackrox_cluster_init_response

- name: Store cluster init bundle as a fact
  ansible.builtin.set_fact:
    f_stackrox_bundle: "{{ r_stackrox_cluster_init_response.json.kubectlBundle | b64decode }}"

- name: Create init-bundle secrets
  kubernetes.core.k8s:
    namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
    state: present
    definition: "{{ f_stackrox_bundle }}"
  register: r_init_bundle
  until: r_init_bundle is successful
  retries: 5
  delay: 5

- name: Deploy SecuredCluster
  kubernetes.core.k8s:
    state: present
    template: securedcluster.yaml.j2
  register: r_securedcluster
  until: r_securedcluster is successful
  retries: 5
  delay: 5

- name: Wait for SecuredCluster to be ready
  kubernetes.core.k8s_info:
    api_version: platform.stackrox.io/v1alpha1
    kind: SecuredCluster
    name: stackrox-secured-cluster-services
    namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
  register: r_secured_cluster
  until: >-
    (r_secured_cluster.resources[0].status | default({})).conditions | default([]) |
    selectattr('type', 'equalto', 'Available') |
    selectattr('status', 'equalto', 'True') |
    selectattr('reason', 'equalto', 'DeploymentsReady') |
    list | length > 0
    or
    (r_secured_cluster.resources[0].status | default({})).conditions | default([]) |
    selectattr('type', 'equalto', 'Deployed') |
    selectattr('status', 'equalto', 'True') |
    selectattr('reason', 'equalto', 'InstallSuccessful') |
    list | length > 0
  retries: 120
  delay: 5

- name: Configure OpenShift authentication
  when: ocp4_workload_rhacs_openshift_auth_enable | bool
  ansible.builtin.include_tasks: openshift_auth.yml

- name: Create Console Plugin
  when: ocp4_workload_rhacs_central_enable_console_plugin | bool
  kubernetes.core.k8s:
    state: present
    template: console-plugin.yaml.j2
  register: r_console_plugin
  until: r_console_plugin is successful
  retries: 5
  delay: 5

- name: Create a link in the OpenShift Console
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: console.openshift.io/v1
      kind: ConsoleLink
      metadata:
        name: acs-console-link
      spec:
        applicationMenu:
          imageURL: 'https://upload.wikimedia.org/wikipedia/commons/3/3a/OpenShift-LogoType.svg'
          section: Red Hat Applications
        href: '{{ _ocp4_workload_rhacs_central_route }}'
        location: ApplicationMenu
        text: Red Hat Advanced Cluster Security for Kubernetes
  register: r_console_link
  until: r_console_link is successful
  retries: 30
  delay: 5

- name: Enable VM scanning on Hyperconverged
  when: ocp4_workload_rhacs_enable_vm_scanning | bool
  ansible.builtin.include_tasks: hyperconverged.yml

- name: Install roxctl on the Bastion host
  when: ocp4_workload_rhacs_install_roxctl | bool
  ansible.builtin.include_tasks: roxctl.yml

- name: Print user info
  agnosticd.core.agnosticd_user_info:
    msg: "{{ item }}"
  loop: >-
    {{ ['', 'Your RHACS console is available at: ' + _ocp4_workload_rhacs_central_route]
    + (['RHACS reencrypt route is available at: ' + _ocp4_workload_rhacs_central_reencrypt_route]
       if ocp4_workload_rhacs_enable_reencrypt_route | bool and _ocp4_workload_rhacs_central_reencrypt_route is defined
       else [])
    + ['RHACS portal username: admin', 'RHACS portal password: ' + _ocp4_workload_rhacs_central_admin_password] }}

- name: Save user data
  agnosticd.core.agnosticd_user_info:
    data: >-
      {{ {'acs_route': _ocp4_workload_rhacs_central_route,
          'acs_portal_username': 'admin',
          'acs_portal_password': _ocp4_workload_rhacs_central_admin_password}
      | combine({'acs_reencrypt_route': _ocp4_workload_rhacs_central_reencrypt_route}
                if ocp4_workload_rhacs_enable_reencrypt_route | bool and _ocp4_workload_rhacs_central_reencrypt_route is defined
                else {}) }}
