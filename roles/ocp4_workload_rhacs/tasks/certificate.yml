---
- name: Get ClusterIssuer info
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: ClusterIssuer
    name: acme-bifrost-production-ddns
  register: r_clusterissuer

- name: Create specific CNAME record for central
  when: r_clusterissuer.resources | default([]) | length > 0
  block:
  - name: Set facts from ClusterIssuer
    vars:
      _webhook: "{{ r_clusterissuer.resources[0].spec.acme.solvers[0].dns01.webhook.config }}"
    ansible.builtin.set_fact:
      ddns_server: "{{ _webhook.ddnsServer }}"
      ddns_zone: "{{ _webhook.ddnsZone }}"
      tsig_key_name: "{{ _webhook.tsigKeyName }}"
      tsig_secret_ref_name: "{{ _webhook.tsigSecretRef.name }}"
      tsig_secret_ref_key: "{{ _webhook.tsigSecretRef.key }}"
  - name: Get TSIG secret value
    kubernetes.core.k8s_info:
      api_version: v1
      kind: Secret
      name: "{{ tsig_secret_ref_name }}"
      namespace: cert-manager
    register: r_tsig_secret
  - name: Set TSIG secret fact
    ansible.builtin.set_fact:
      tsig_secret: "{{ r_tsig_secret.resources[0].data[tsig_secret_ref_key] | b64decode }}"

  - name: Create specific CNAME record for central
    community.general.nsupdate:
      server: "{{ lookup('community.general.dig', ddns_server) }}"
      zone: "{{ ddns_zone }}"
      record: "central-{{ ocp4_workload_rhacs_central_namespace }}.{{ openshift_cluster_ingress_domain | replace('.' + ddns_zone, '') }}"
      type: CNAME
      ttl: 30
      port: "{{ cluster_dns_port | d('53') }}"
      value: "console-openshift-console.{{ openshift_cluster_ingress_domain }}."
      key_name: "{{ tsig_key_name }}"
      key_secret: "{{ tsig_secret }}"
      key_algorithm: "hmac-sha256"

# Check for existing valid certificate and skip provisioning if found
- name: Check if valid Certificate already exists
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: Certificate
    name: rhacs-central-cert
    namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
  register: r_existing_certificate

- name: Set certificate status fact
  ansible.builtin.set_fact:
    _ocp4_workload_rhacs_cert_already_valid: >-
      {{
        r_existing_certificate.resources | length > 0
        and (r_existing_certificate.resources[0].status.conditions
             | default([])
             | selectattr('type', 'equalto', 'Ready')
             | selectattr('status', 'equalto', 'True')
             | list | length > 0)
      }}

- name: Use existing certificate
  when: _ocp4_workload_rhacs_cert_already_valid | bool
  ansible.builtin.set_fact:
    r_certificate_central: "{{ r_existing_certificate }}"

- name: Create Certificate for Central
  when: not _ocp4_workload_rhacs_cert_already_valid | bool
  block:
  - name: Get ClusterIssuer(s)
    kubernetes.core.k8s_info:
      api_version: cert-manager.io/v1
      kind: ClusterIssuer
    register: r_cluster_issuers
    until: r_cluster_issuers is successful
    retries: 5
    delay: 5

  - name: Filter to Ready ClusterIssuers only (exclude Google Trust Services if reencrypt enabled)
    ansible.builtin.set_fact:
      _ready_cluster_issuers: >-
        {{
          (r_cluster_issuers.resources
          | json_query(
              "[?status.conditions[?type=='Ready' && status=='True']
              && (spec.acme.server == null
              || !contains(spec.acme.server, '/acme/google/'))]"
            )
          | list)
          if ocp4_workload_rhacs_enable_reencrypt_route | bool
          else (r_cluster_issuers.resources
          | json_query("[?status.conditions[?type=='Ready' && status=='True']]")
          | list)
        }}

  - name: Fail if no ClusterIssuer is found but certificates are requested
    when: _ready_cluster_issuers | length == 0
    ansible.builtin.fail:
      msg: "No Ready ClusterIssuer found to issue certificates for Central"

  - name: Build list of ClusterIssuers to try (alphabetical order)
    ansible.builtin.set_fact:
      _cluster_issuers_to_try: >-
        {{
          _ready_cluster_issuers | map(attribute='metadata.name') | list | sort
        }}

  - name: Try each ClusterIssuer until certificate is issued successfully
    when: r_certificate_central is not defined or r_certificate_central is failed
    vars:
      _ocp4_workload_rhacs_cert_cluster_issuer: "{{ item }}"
    ansible.builtin.include_tasks: try_certificate_issuer.yml
    loop: "{{ _cluster_issuers_to_try }}"
    loop_control:
      label: "{{ item }}"
