---
# OCP IBI (Image-Based Install) role defaults

# Seed image — OCI container image with captured SNO
host_ocp4_ibi_seed_image: ""
host_ocp4_ibi_seed_version: ""

# Target disk for RHCOS installation
host_ocp4_ibi_installation_disk: /dev/vda

# Container storage partition offset from end of disk
host_ocp4_ibi_extra_partition_start: ""

# OCP version for downloading openshift-install binary
host_ocp4_installer_version: "4.22"

# Mirror URL for downloading openshift-install
host_ocp4_installer_root_url: https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp

# Cluster config
host_ocp4_cluster_name: "{{ ocp.cluster_name | default('sno') }}"
host_ocp4_base_domain: "{{ ocp.base_domain | default('sno.local') }}"
host_ocp4_api_vip: "{{ ocp.api_vip }}"
host_ocp4_ingress_vip: "{{ ocp.ingress_vip | default(ocp.api_vip) }}"

# Pull secret
host_ocp4_pull_secret: "{{ pull_secret | default('{}') }}"

# SSH public key
host_ocp4_ssh_key: "{{ ssh_pub_key | default('') }}"

# BMC credentials
host_ocp4_bmc_user: admin
host_ocp4_bmc_password: "{{ common_password }}"
host_ocp4_bmc_ips: []

# Network CIDRs
host_ocp4_machine_network_cidr: "{{ networks.cluster.cidr | default('10.0.0.0/24') }}"
host_ocp4_cluster_network_cidr: 10.128.0.0/14
host_ocp4_service_network_cidr: 172.30.0.0/16

# Install dir on bastion
host_ocp4_ibi_install_dir: "/home/{{ ansible_user }}/ibi-install"
host_ocp4_ibi_config_dir: "/home/{{ ansible_user }}/ibi-config"

# HTTP server port for serving ISO
host_ocp4_iso_http_port: 8080

# Timeout for IBI install (seconds) — much shorter than agent install
host_ocp4_ibi_install_timeout: 1800

# NTP sources
host_ocp4_ntp_sources:
  - clock.redhat.com
  - pool.ntp.org

# Debug root password — set to a plaintext password to enable VNC console login
# on the seed-restored RHCOS system. Leave empty for production.
host_ocp4_ibi_debug_password: ""
