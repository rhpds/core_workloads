#   root_volume_type: gp3
#   root_volume_size: 120
#   network_type: OVNKubernetes
#   region: us-west-2
#   zones: # Optional, list zones to deploy into, each zone will get the same number of workers
#   - us-west-2a
#   labels:
#     rhdp_type: sandbox
#     rhdp_usage: development

# - name: production
#   infra_id: prod-{{ guid }}
#   ocp_release: 4.13.11
