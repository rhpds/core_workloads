---
#############################################################################
# Prerequisite Checks
#############################################################################
- name: Ensure RHACM MultiClusterHub is deployed
  kubernetes.core.k8s_info:
    api_version: "operator.open-cluster-management.io/v1"
    kind: MultiClusterHub
    name: multiclusterhub
    namespace: open-cluster-management
  register: r_rhacm_multiclusterhub

- name: Assert that MultiClusterHub is available
  ansible.builtin.assert:
    that:
    - r_rhacm_multiclusterhub.resources | length == 1
    - r_rhacm_multiclusterhub.resources[0].status.phase is defined
    - r_rhacm_multiclusterhub.resources[0].status is defined
    - r_rhacm_multiclusterhub.resources[0].status.phase == "Running"
    # quiet: true
    fail_msg: "MultiClusterHub not found on cluster. Can not continue."
    success_msg: "MultiClusterHub found on cluster. Ready to set up Hypershift."

- name: Assert that MultiClusterHub is version 2.17.0 or higher
  ansible.builtin.assert:
    that: "r_rhacm_multiclusterhub.resources[0].status.currentVersion is version('2.17.0', '>=')"
    quiet: true
    fail_msg: "MultiClusterHub not at version 2.17.0 or higher. Please upgrade your RHACM. Can not continue."
    success_msg: "MultiClusterHub found on cluster in version 2.17.0 or higher. Ready to set up Hypershift."

#############################################################################
# AWS S3 bucket setup
#############################################################################
- name: Ensure AWS S3 bucket is absent
  amazon.aws.s3_bucket:
    name: "{{ ocp_workload_rhacm_hcp_s3_bucket_name }}"
    state: absent
    aws_access_key: "{{ aws_access_key_id }}"
    aws_secret_key: "{{ aws_secret_access_key }}"
  register: r_s3_bucket_absent
  until: r_s3_bucket_absent.changed == false
  retries: 10
  delay: 10

- name: Create AWS S3 bucket
  amazon.aws.s3_bucket:
    name: "{{ ocp_workload_rhacm_hcp_s3_bucket_name }}"
    region: "{{ ocp_workload_rhacm_hcp_s3_bucket_region }}"
    state: present
    aws_access_key: "{{ aws_access_key_id }}"
    aws_secret_key: "{{ aws_secret_access_key }}"
    # public_access:
    #   block_public_acls: false
    #   block_public_policy: false
    #   ignore_public_acls: true
    #   restrict_public_buckets: false

- name: Update s3 bucket
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_REGION: "{{ ocp_workload_rhacm_hcp_s3_bucket_region }}"
  ansible.builtin.command:
    cmd: >-
      aws s3api delete-public-access-block
        --bucket {{ ocp_workload_rhacm_hcp_s3_bucket_name }}
  changed_when: true

- name: Copy policy file
  ansible.builtin.template:
    src: bucket-policy.json.j2
    dest: /tmp/bucket-policy.json
    mode: ug=rw,o=r

- name: Apply bucket policy
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_REGION: "{{ ocp_workload_rhacm_hcp_s3_bucket_region }}"
  ansible.builtin.command:
    chdir: /tmp
    cmd: >-
      aws s3api put-bucket-policy
        --bucket {{ ocp_workload_rhacm_hcp_s3_bucket_name }}
        --policy file://bucket-policy.json
  changed_when: true

- name: Remove temporary policy file
  ansible.builtin.file:
    state: absent
    path: /tmp/bucket-policy.json

#############################################################################
# Configure HyperShift
#############################################################################
- name: Create s3 credentials secret
  kubernetes.core.k8s:
    state: present
    template: secret-s3-credentials.yaml.j2

- name: Generate an OpenSSH keypair for HyperShift
  community.crypto.openssh_keypair:
    path: "/tmp/{{ ocp_workload_rhacm_key_pair_name }}"
  register: r_hypershift_key

- name: Read private key from filesystem
  ansible.builtin.slurp:
    src: "/tmp/{{ ocp_workload_rhacm_key_pair_name }}"
  register: r_hypershift_private_key

- name: Read public key from filesystem
  ansible.builtin.slurp:
    src: "/tmp/{{ ocp_workload_rhacm_key_pair_name }}.pub"
  register: r_hypershift_public_key

- name: Create hypershift aws credentials secret
  kubernetes.core.k8s:
    state: present
    template: secret-aws-credentials.yaml.j2

#############################################################################
# Install HCP CLI
#############################################################################
- name: Wait until HCP CLI download deployment is ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: multicluster-engine
    name: hcp-cli-download
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_sleep: 30
    wait_timeout: 1800

- name: Get HCP CLI download URL
  kubernetes.core.k8s_info:
    api_version: console.openshift.io/v1
    kind: ConsoleCLIDownload
    name: hcp-cli-download
  register: r_hcp_cli_download
  retries: 20
  delay: 10
  until: r_hcp_cli_download.resources | length > 0

- name: Set HCP CLI download URL
  when: r_hcp_cli_download.resources | length > 0
  ansible.builtin.set_fact:
    _ocp_workload_rhacm_hcp_cli_url: >-
      {{ r_hcp_cli_download.resources[0] | to_json | from_json
      | json_query("spec.links[?contains(href,'/linux/amd64')].href") | first }}

- name: Install HCP CLI on Bastion
  delegate_to: "{{ (groups['bastions'] | default(['localhost']))[0] }}"
  block:
  - name: Download HCP CLI
    ansible.builtin.get_url:
      url: "{{ _ocp_workload_rhacm_hcp_cli_url }}"
      validate_certs: false
      dest: /tmp/hcp.tar.gz
      mode: ug=rw,o=r
    register: r_hcp_cli
    until: r_hcp_cli is success
    retries: 10
    delay: 10

  - name: Install HCP CLI on bastion
    become: true
    ansible.builtin.unarchive:
      src: /tmp/hcp.tar.gz
      remote_src: true
      dest: /usr/bin
      mode: ug=rwx,o=rx
      owner: root
      group: root
    args:
      creates: /usr/bin/hcp

  - name: Remove downloaded file
    ansible.builtin.file:
      state: absent
      path: /tmp/hcp.tar.gz

  - name: Setup HCP CLI bash completion
    become: true
    ansible.builtin.shell: "/usr/bin/hcp completion bash >/etc/bash_completion.d/hcp"
    args:
      creates: /etc/bash_completion.d/hcp

  - name: Write pull secret to a file
    ansible.builtin.copy:
      content: "{{ ocp4_pull_secret }}"
      dest: /tmp/pull_secret.json
      mode: ug=rw,o=r

#############################################################################
# Set up Policies
# Automatically configure newly deployed HCP clusters
#############################################################################
- name: Set up Policies
  when: ocp_workload_rhacm_hcp_policies_setup | bool
  kubernetes.core.k8s:
    state: present
    template: "{{ item }}"
  loop:
  - policies/namespace-policies.yaml.j2
  - policies/managedclustersetbinding.yaml.j2
  - policies/secret.yaml.j2
  - policies/application.yaml.j2

#############################################################################
# Set up ManagedClusterSet Policies
#############################################################################
- name: Set up ManagedClusterSet
  when: ocp_workload_rhacm_hcp_managed_cluster_set_setup | bool
  kubernetes.core.k8s:
    state: present
    template: "{{ item }}"
  loop:
  - managedclusterset/namespace-submariner-broker.yaml.j2
  - managedclusterset/managedclusterset.yaml.j2
  - managedclusterset/managedclustersetbinding.yaml.j2

#############################################################################
# Wait for ConfigMap kube-public/oidc-storage-provider-s3-config to be
# available before proceeding
#############################################################################
- name: Wait for ConfigMap kube-public/oidc-storage-provider-s3-config
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: oidc-storage-provider-s3-config
    namespace: kube-public
  register: r_oidc_configmap
  until:
  - r_oidc_configmap.resources is defined
  - r_oidc_configmap.resources | length > 0
  retries: 60
  delay: 10

#############################################################################
# Deploy managed HyperShift clusters
#############################################################################
- name: Deploy Hypershift clusters
  when: ocp_workload_rhacm_hcp_deploy_clusters | length > 0
  ansible.builtin.include_tasks: create_hypershift_cluster.yml
  vars:
    _ocp_workload_rhacm_hcp_cluster_name: "{{ cluster.name }}"
    _ocp_workload_rhacm_hcp_cluster_infra_id: "{{ cluster.infra_id }}"
    _ocp_workload_rhacm_hcp_cluster_ocp_release: "{{ cluster.ocp_release }}"
    _ocp_workload_rhacm_hcp_cluster_control_plane_availability: "{{ cluster.control_plane_availability | default('SingleReplica') }}"
    _ocp_workload_rhacm_hcp_cluster_infra_availability: "{{ cluster.infra_availability | default('SingleReplica') }}"
    _ocp_workload_rhacm_hcp_cluster_etc_storage_class: "{{ cluster.etcd_storage_class | default('gp3-csi') }}"
    _ocp_workload_rhacm_hcp_cluster_nodepool_replicas: "{{ cluster.nodepool_replicas }}"
    _ocp_workload_rhacm_hcp_cluster_worker_instance_type: "{{ cluster.worker_instance_type }}"
    _ocp_workload_rhacm_hcp_cluster_root_volume_type: "{{ cluster.root_volume_type | default('gp3') }}"
    _ocp_workload_rhacm_hcp_cluster_root_volume_size: "{{ cluster.root_volume_size | default('120') }}"
    _ocp_workload_rhacm_hcp_cluster_network_type: "{{ cluster.network_type | default('OVNKubernetes') }}"
    _ocp_workload_rhacm_hcp_cluster_region: "{{ cluster.region }}"
    _ocp_workload_rhacm_hcp_cluster_zones: "{{ cluster.zones | default([]) }}"
    _ocp_workload_rhacm_hcp_cluster_labels: "{{ cluster.labels | default([]) }}"
  loop: "{{ ocp_workload_rhacm_hcp_deploy_clusters }}"
  loop_control:
    label: "{{ cluster.name }}"
    loop_var: cluster

#############################################################################
# AgnosticD User Data
#############################################################################
- name: Save access information for all deployed clusters
  when: ocp_workload_rhacm_hcp_deploy_clusters | length > 0
  ansible.builtin.include_tasks:
    file: get_cluster_credentials.yml
  vars:
    _ocp_workload_rhacm_hcp_cluster_name: "{{ item.name }}"
  loop: "{{ ocp_workload_rhacm_hcp_deploy_clusters }}"
  loop_control:
    label: "{{ item.name }}"

- name: Save user data for S3 bucket
  agnosticd.core.agnosticd_user_info:
    data:
      hypershift_s3_bucket_name: "{{ ocp_workload_rhacm_hcp_s3_bucket_name }}"
      hypershift_s3_region: "{{ ocp_workload_rhacm_hcp_s3_bucket_region }}"
      hypershift_s3_access_key_id: "{{ aws_access_key_id }}"
      hypershift_s3_secret_access_key: "{{ aws_secret_access_key }}"
